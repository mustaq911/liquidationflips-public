<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password - Liquidation Flips</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root{
      --bg:#f7f7f8;
      --panel:#fff;
      --text:#111827;
      --muted:#6b7280;
      --brand:#2563eb;
      --brand2:#1e40af;
      --border:#e5e7eb;
      --shadow: 0 16px 40px rgba(15,23,42,0.07);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--text)}
    .page{max-width:560px;margin:0 auto;padding:24px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .hero{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
    .icon{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:rgba(37,99,235,.10);border:1px solid rgba(37,99,235,.18);color:var(--brand)}
    h1{margin:0 0 6px;font-size:20px}
    .muted{color:var(--muted);font-size:13px;line-height:1.5}
    .field{display:block;margin:12px 0}
    .field span{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .field input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font-size:14px;outline:none}
    .btn{display:inline-flex;gap:8px;align-items:center;justify-content:center;
      width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--border);
      background:#fff;cursor:pointer;font-weight:900}
    .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn-primary:hover{background:var(--brand2)}
    .msg{margin-top:10px;font-size:13px;font-weight:800}
    .msg.ok{color:#0f7a3d}
    .msg.err{color:crimson}
  </style>
</head>
<body>

  <script src="/js/config.js"></script>

  <div class="page">
    <div class="card">
      <div class="hero">
        <div class="icon"><i class="fa-solid fa-key"></i></div>
        <div>
          <h1>Reset your password</h1>
          <div class="muted">Enter a new password and confirm it to finish resetting.</div>
        </div>
      </div>

      <form id="form">
        <label class="field">
          <span>New password</span>
          <input type="password" id="p1" placeholder="••••••••" required minlength="6">
        </label>

        <label class="field">
          <span>Confirm password</span>
          <input type="password" id="p2" placeholder="••••••••" required minlength="6">
        </label>

        <button class="btn btn-primary" type="submit">
          <i class="fa-solid fa-floppy-disk"></i> Save new password
        </button>

        <div id="msg" class="msg"></div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE_URL = CONFIG.API_BASE_URL;
    const qs = new URLSearchParams(location.search);
    const token = qs.get("token");

    const msg = document.getElementById("msg");
    const form = document.getElementById("form");

    function setMsg(text, type){
      msg.textContent = text || "";
      msg.className = "msg" + (type ? (" " + type) : "");
    }

    async function validateToken(){
      if(!token){
        setMsg("Missing token. Please use the link from your email.", "err");
        form.querySelector("button").disabled = true;
        return;
      }

      try{
        const res = await fetch(`${API_BASE_URL}/auth/password/reset/validate?token=${encodeURIComponent(token)}`);
        if(!res.ok){
          const data = await res.json().catch(()=> ({}));
          setMsg(data.message || "Invalid or expired token.", "err");
          form.querySelector("button").disabled = true;
          return;
        }
      }catch(e){
        setMsg("Network error while validating token.", "err");
        form.querySelector("button").disabled = true;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("", "");

      const p1 = document.getElementById("p1").value;
      const p2 = document.getElementById("p2").value;

      if(p1.length < 6){
        setMsg("Password must be at least 6 characters.", "err");
        return;
      }
      if(p1 !== p2){
        setMsg("Passwords do not match.", "err");
        return;
      }

      try{
        const res = await fetch(`${API_BASE_URL}/auth/password/reset`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ token, newPassword: p1 })
        });

        const data = await res.json().catch(()=> ({}));

        if(!res.ok){
          setMsg(data.message || "Could not reset password.", "err");
          return;
        }

        setMsg("✅ Password updated. You can now sign in.", "ok");

        setTimeout(() => {
          window.location.href = "/index.html";
        }, 1200);

      }catch(err){
        setMsg("Network error. Please try again.", "err");
      }
    });

    window.addEventListener("DOMContentLoaded", validateToken);
  </script>
</body>
</html>
